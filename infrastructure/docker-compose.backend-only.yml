# Backend-only compose for local backend development.
# Run from code/backend/: docker compose up
# The ml_services import will fall back to the AR(1) implementation because
# the build context (.) is code/backend/ only and ml_services is not present.
# Use the root docker-compose.yml for a full stack with ml_services.

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantyield
      POSTGRES_USER: quantyield
      POSTGRES_PASSWORD: quantyield_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantyield"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: quantyield.settings.development
      SECRET_KEY: django-insecure-backend-dev-key
      DEBUG: "True"
      DATABASE_URL: postgres://quantyield:quantyield_dev@db:5432/quantyield
      CACHE_URL: redis://redis:6379/1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      FRED_API_KEY: ${FRED_API_KEY:-}
      CURVE_CACHE_TTL: "60"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - .:/app
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed_data &&
        uvicorn quantyield.asgi:application --host 0.0.0.0 --port 8000 --reload
      "

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/staticfiles:ro
    depends_on:
      - api

volumes:
  postgres_data:
  static_files:
