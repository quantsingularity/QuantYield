# QuantYield nginx configuration
# Serves the React SPA from /usr/share/nginx/html (frontend_dist volume)
# and proxies /api/ and /static/ through to the Django API container.

upstream django_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # ── Django static files ──────────────────────────────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Django admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA (catch-all) ────────────────────────────────────────────────
    # Must come last. try_files serves static assets directly and falls back
    # to index.html for all client-side routes (react-router-dom).
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
